name: Changelog check

# Require at least one changie fragment in .changes/unreleased/ on every PR
# that touches Go source files.  Docs-only, test-only, and CI-only PRs are
# exempt — the job only runs when Go files change.
#
# To skip intentionally, add the label "no-changelog" to the PR.

on:
  pull_request:
    branches: [main]

jobs:
  changelog:
    name: Require changelog entry
    runs-on: ubuntu-latest

    # Skip if the PR has the "no-changelog" label
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-changelog') }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the base branch so we can diff against it
          fetch-depth: 0

      - name: Check whether any Go files changed
        id: go_changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          COUNT=$(git diff --name-only "$BASE" "$HEAD" | grep -c '\.go$' || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Check for unreleased changelog fragment
        if: steps.go_changed.outputs.count != '0'
        run: |
          FRAGMENTS=$(find .changes/unreleased -name '*.yaml' ! -name '.gitkeep' | wc -l)
          if [ "$FRAGMENTS" -eq 0 ]; then
            echo ""
            echo "❌  No changie fragment found in .changes/unreleased/"
            echo ""
            echo "    This PR changes Go source files but has no changelog entry."
            echo "    Run:  changie new"
            echo "    ...choose a kind and write a one-line summary, then commit"
            echo "    the generated .yaml file alongside your code changes."
            echo ""
            echo "    If this change genuinely needs no entry (e.g. a test-only"
            echo "    or CI-only change), add the 'no-changelog' label to the PR."
            exit 1
          fi
          echo "✓  Found $FRAGMENTS unreleased fragment(s)"
