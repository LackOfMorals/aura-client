run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - gocritic
    - gosec
    - makezero
    - misspell
    - nakedret
    - revive
    - errcheck

linters-settings:
  staticcheck:
    checks:
      - "all"
      - "-QF1008"
      - "-ST1000"

issues:
  exclude-rules:
    # Don't require error checks or security linting in test files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    # Examples are runnable demos, not production code
    - path: ^examples/
      linters:
        - revive
        - errcheck
        - gosec
        - ineffassign
